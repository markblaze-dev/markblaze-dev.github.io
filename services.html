<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERVICES | SOIL PASSION</title>
    <link rel="icon" href="/ASSETS/flower-outline.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <a href="index.html"><img class="logo-circle" src="ASSETS/logo-soil-passion-circle-crop.png"></a>
    <div class="rightSide">
      <div class="btns dayNight">
        <ion-icon name="moon-outline"></ion-icon>
        <ion-icon name="sunny-outline"></ion-icon>
      </div>
      <div class="btns menuToggle">
        <ion-icon name="menu-outline"></ion-icon>
        <ion-icon name="close-outline"></ion-icon>
      </div>
    </div>
  </header>
  <section class="main">
    <p class="copyrightText">&copy SOIL PASSION 2023</p>
    <ul class="sci">
      <li><a href="https://www.facebook.com/soilpassion.btc"><ion-icon name="logo-facebook"></ion-icon></a></li>
      <li><a href="https://www.instagram.com/soilpassion.btc/"><ion-icon name="logo-instagram"></ion-icon></a></li>
    </ul>
  </section>

  <!-- Sidebar Navigation -->
  <ul class="navigation">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="services.html">Services</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  <script>
    let dayNight = document.querySelector('.dayNight')
    let menuToggle = document.querySelector('.menuToggle')
    let body = document.querySelector('body')
    let navigation = document.querySelector('.navigation')

    dayNight.onclick = function(){
      body.classList.toggle('dark')
      dayNight.classList.toggle('active')
    }

    menuToggle.onclick = function (){
      menuToggle.classList.toggle('active')
      navigation.classList.toggle('active')
    }
  </script>
</body>
</html>
